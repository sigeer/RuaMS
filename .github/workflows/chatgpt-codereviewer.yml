name: Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  review:
    # if: ${{ contains(github.event.*.labels.*.name, 'gpt review') }} # Optional; to run only when a label is attached
    runs-on: ubuntu-latest
    steps:
      - uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_ENDPOINT: https://open.bigmodel.cn/api/paas/v4
          MODEL: GLM-4.7-Flash

          # common
          LANGUAGE: Chinese
          PROMPT: "请检查差异代码中的逻辑错误、潜在bug和代码风格问题："
          top_p: 1
          temperature: 1
          max_tokens: 10000
          MAX_PATCH_LENGTH: 10000 # 单个 diff 超过此长度将跳过评审
          INCLUDE_PATTERNS: "*.cs"
          IGNORE_PATTERNS: "**/Migrations/**/*.cs"